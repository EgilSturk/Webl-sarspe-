<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Hedgehog Hunger Quest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a0a;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none}
canvas{display:block;position:fixed;inset:0;z-index:0}
#hud{position:fixed;top:0;left:0;right:0;padding:14px 16px;pointer-events:none;z-index:10;display:flex;align-items:flex-start;gap:12px}
#score{color:#fff;font-size:24px;font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.7);margin-left:auto;min-width:90px;text-align:right;letter-spacing:1px}
#hunger-wrap{flex:1;max-width:220px}
#hunger-label{color:rgba(255,255,255,.9);font-size:11px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.7);margin-bottom:5px;letter-spacing:1.5px}
#hunger-bg{background:rgba(0,0,0,.45);border-radius:10px;height:16px;overflow:hidden;border:1.5px solid rgba(255,255,255,.3);box-shadow:0 2px 8px rgba(0,0,0,.4)}
#hunger-fill{height:100%;border-radius:10px;transition:width .12s linear,background .4s;will-change:width}
#joy-base{position:fixed;bottom:70px;left:40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);touch-action:none;display:none;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#joy-knob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.6);top:34px;left:34px;pointer-events:none;box-shadow:0 2px 10px rgba(0,0,0,.35)}
#btn-sniff{position:fixed;bottom:80px;right:40px;width:76px;height:76px;border-radius:50%;background:rgba(255,190,40,.4);border:2px solid rgba(255,210,70,.65);display:none;z-index:10;align-items:center;justify-content:center;font-size:30px;cursor:pointer;touch-action:none;user-select:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(10,24,6,.72);backdrop-filter:blur(4px)}
#ov-title{color:#fff;font-size:clamp(30px,8vw,52px);font-weight:900;text-shadow:0 3px 12px rgba(0,0,0,.8);text-align:center;line-height:1.1;margin-bottom:10px}
#ov-emoji{font-size:clamp(52px,14vw,80px);margin-bottom:8px;line-height:1}
#ov-desc{color:rgba(255,255,255,.82);font-size:clamp(14px,3.5vw,19px);text-align:center;margin-bottom:4px}
#ov-hint{color:rgba(255,255,255,.5);font-size:clamp(11px,2.8vw,14px);margin-top:10px;text-align:center;max-width:320px;line-height:1.4}
#ov-score{color:#f5c842;font-size:clamp(22px,5.5vw,34px);font-weight:800;margin:14px 0 4px;display:none}
#ov-hi{color:rgba(255,215,60,.6);font-size:clamp(13px,3.2vw,16px);display:none}
#start-btn{margin-top:26px;padding:15px 40px;border-radius:32px;background:linear-gradient(135deg,#e8a020,#f5c842);color:#3a1a00;font-size:19px;font-weight:900;border:none;cursor:pointer;box-shadow:0 5px 20px rgba(232,160,32,.55);letter-spacing:.5px;transition:transform .12s}
#start-btn:active{transform:scale(.95)}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(12,28,8,.97)}
#loading .hedgehog-anim{font-size:60px;animation:bounce .6s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
#load-msg{color:rgba(255,255,255,.8);font-size:15px;margin-top:14px}
#prog-bar{width:200px;height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:14px;overflow:hidden}
#prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#e8a020,#f5c842);width:0%;transition:width .25s}
.score-pop{position:fixed;pointer-events:none;font-size:24px;font-weight:900;color:#f5c842;text-shadow:0 2px 8px rgba(0,0,0,.7);z-index:15;animation:floatUp .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.9)}60%{opacity:1;transform:translateY(-40px) scale(1.15)}100%{opacity:0;transform:translateY(-80px) scale(1)}}
.food-name-pop{position:fixed;pointer-events:none;font-size:15px;font-weight:700;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:15;animation:floatUp .9s ease-out forwards}
#dev{position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;pointer-events:none;z-index:50;display:none}
@media(hover:none){#joy-base{display:flex}#btn-sniff{display:flex}}
</style>
</head>
<body>

<div id="loading">
  <div class="hedgehog-anim">🦔</div>
  <div id="load-msg">Loading hedgehog…</div>
  <div id="prog-bar"><div id="prog-fill"></div></div>
</div>

<div id="hud">
  <div id="hunger-wrap">
    <div id="hunger-label">HUNGER</div>
    <div id="hunger-bg"><div id="hunger-fill"></div></div>
  </div>
  <div id="score">0</div>
</div>

<div id="joy-base"><div id="joy-knob"></div></div>
<div id="btn-sniff">👃</div>

<div id="overlay">
  <div id="ov-emoji">🦔</div>
  <div id="ov-title">Hedgehog<br>Hunger Quest</div>
  <div id="ov-desc">Find food before your hunger runs out!</div>
  <div id="ov-hint">WASD / arrows to move&nbsp;&nbsp;•&nbsp;&nbsp;Mobile: joystick<br>👃 Sniff to detect nearby food</div>
  <div id="ov-score"></div>
  <div id="ov-hi"></div>
  <button id="start-btn">Play</button>
</div>

<div id="dev"></div>

<script src="./assets/bundle.js"></script>
</body>
</html>
