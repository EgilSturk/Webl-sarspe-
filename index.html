<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Αναζήτηση Τροφής Σκαντζόχοιρου</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;}

/* HUD */
#score-box{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border-radius:12px;padding:6px 18px;
  color:#fff;font-family:sans-serif;font-size:1.1em;text-align:center;white-space:nowrap;
  pointer-events:none;}
#hunger-wrap{position:fixed;top:54px;left:50%;transform:translateX(-50%);
  width:min(260px,70vw);background:rgba(0,0,0,.4);border-radius:8px;padding:4px 10px;
  pointer-events:none;}
#hunger-label{color:#ffd700;font-family:sans-serif;font-size:.75em;text-align:center;letter-spacing:.05em;}
#hunger-fill{height:10px;border-radius:5px;background:#27ae60;width:100%;transition:width .2s,background .2s;}

/* Controls — hidden until touch detected */
#joy-base{position:fixed;bottom:24px;left:24px;width:110px;height:110px;border-radius:50%;
  background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
  display:none;touch-action:none;}
#joy-knob{width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.55);border:2px solid rgba(255,255,255,.8);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#btn-sniff{position:fixed;bottom:24px;right:24px;width:80px;height:80px;border-radius:50%;
  background:rgba(255,200,50,.35);border:2px solid rgba(255,200,50,.6);
  color:#fff;font-family:sans-serif;font-size:.8em;text-align:center;line-height:80px;
  display:none;touch-action:none;user-select:none;-webkit-user-select:none;}

/* Start / End overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-family:sans-serif;text-align:center;padding:24px;z-index:10;}
#ov-emoji{font-size:3em;margin-bottom:.2em;}
#ov-title{font-size:2em;margin-bottom:.4em;color:#ffd700;}
#ov-desc{font-size:1.05em;margin-bottom:.5em;opacity:.9;}
#ov-hint{font-size:.82em;opacity:.62;margin-bottom:1.3em;display:block;}
#ov-score{font-size:1.35em;margin-bottom:.2em;display:none;}
#ov-hi{font-size:1em;opacity:.72;margin-bottom:1.3em;display:none;}
#start-btn{padding:14px 38px;font-size:1.15em;border-radius:30px;border:none;
  background:#e67e22;color:#fff;cursor:pointer;font-family:sans-serif;}

/* Loading screen (sits on top of overlay while assets load) */
#loading{position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-family:sans-serif;z-index:20;}
#load-msg{font-size:1em;opacity:.7;margin-bottom:14px;}
#prog-wrap{width:min(220px,60vw);height:6px;background:rgba(255,255,255,.2);border-radius:3px;}
#prog-fill{height:100%;width:0;background:#e67e22;border-radius:3px;transition:width .15s;}

/* Dev overlay */
#dev{position:fixed;top:4px;left:4px;color:#0f0;font-family:monospace;font-size:.7em;
  display:none;pointer-events:none;z-index:30;}

/* Score pop-ups */
.score-pop{position:fixed;color:#ffd700;font-family:sans-serif;font-weight:bold;
  font-size:1.1em;pointer-events:none;z-index:15;
  animation:popUp .95s ease-out forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-48px)}}
</style>
</head>
<body>

<!-- HUD -->
<div id="score-box">Σκορ: <span id="score">0</span></div>
<div id="hunger-wrap">
  <div id="hunger-label">ΠΕΙΝΑ</div>
  <div id="hunger-fill"></div>
</div>

<!-- Controls -->
<div id="joy-base"><div id="joy-knob"></div></div>
<div id="btn-sniff">Μύρισε</div>

<!-- Start / End overlay -->
<div id="overlay">
  <div id="ov-emoji">🦔</div>
  <h1 id="ov-title">Σκαντζόχοιρος Αναζητά Τροφή</h1>
  <p id="ov-desc">Βρες φαγητό πριν ξεμείνεις από πείνα!</p>
  <small id="ov-hint">Χρησιμοποίησε το joystick για να κινηθείς · «Μύρισε» για να βρεις φαγητό</small>
  <div id="ov-score"></div>
  <div id="ov-hi"></div>
  <button id="start-btn">Παίξε</button>
</div>

<!-- Loading screen (hides when assets finish loading) -->
<div id="loading">
  <div id="load-msg">Φόρτωση σκαντζόχοιρου…</div>
  <div id="prog-wrap"><div id="prog-fill"></div></div>
</div>

<!-- Dev info -->
<div id="dev"></div>

<script src="./assets/bundle.js"></script>
</body>
</html>
