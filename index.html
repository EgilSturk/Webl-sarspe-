<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Αναζήτηση Τροφής Σκαντζόχοιρου</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;}
#score-box{position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border-radius:12px;padding:6px 18px;
  color:#fff;font-family:sans-serif;font-size:1.1em;text-align:center;white-space:nowrap;}
#hunger-bar-wrap{position:fixed;top:54px;left:50%;transform:translateX(-50%);
  width:min(260px,70vw);background:rgba(0,0,0,.4);border-radius:8px;padding:4px 10px;}
#hunger-label{color:#ffd700;font-family:sans-serif;font-size:.75em;text-align:center;letter-spacing:.05em;}
#hunger-bar{height:10px;border-radius:5px;background:#e74c3c;width:100%;transition:width .2s,background .2s;}
#controls{position:fixed;bottom:0;left:0;width:100%;display:flex;
  justify-content:space-between;align-items:flex-end;padding:18px;pointer-events:none;}
#joy-base{width:110px;height:110px;border-radius:50%;
  background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
  position:relative;pointer-events:auto;touch-action:none;flex-shrink:0;}
#joy-knob{width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.55);border:2px solid rgba(255,255,255,.8);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#btn-sniff{width:80px;height:80px;border-radius:50%;
  background:rgba(255,200,50,.35);border:2px solid rgba(255,200,50,.6);
  color:#fff;font-family:sans-serif;font-size:.8em;text-align:center;line-height:80px;
  pointer-events:auto;touch-action:none;user-select:none;-webkit-user-select:none;flex-shrink:0;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-family:sans-serif;text-align:center;padding:24px;z-index:10;}
#overlay h1{font-size:2em;margin-bottom:.4em;color:#ffd700;}
#overlay p{font-size:1.1em;margin-bottom:.5em;opacity:.9;}
#overlay small{font-size:.85em;opacity:.65;margin-bottom:1.4em;display:block;}
#start-btn{padding:14px 38px;font-size:1.15em;border-radius:30px;border:none;
  background:#e67e22;color:#fff;cursor:pointer;font-family:sans-serif;}
#load-msg{margin-top:18px;font-size:.9em;opacity:.6;}
#end-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-family:sans-serif;text-align:center;padding:24px;z-index:11;}
#end-overlay h2{font-size:2em;color:#e74c3c;margin-bottom:.3em;}
#end-overlay p{font-size:1em;opacity:.8;margin-bottom:.8em;}
#end-score{font-size:1.4em;margin-bottom:.2em;}
#end-best{font-size:1em;opacity:.7;margin-bottom:1.4em;}
#restart-btn{padding:13px 34px;font-size:1.1em;border-radius:28px;border:none;
  background:#27ae60;color:#fff;cursor:pointer;font-family:sans-serif;}
</style>
</head>
<body>
<div id="ui">
  <div id="score-box">Σκορ: <span id="score">0</span></div>
  <div id="hunger-bar-wrap">
    <div id="hunger-label">ΠΕΙΝΑ</div>
    <div id="hunger-bar"></div>
  </div>
</div>

<div id="controls">
  <div id="joy-base"><div id="joy-knob"></div></div>
  <div id="btn-sniff">Μύρισε</div>
</div>

<div id="overlay">
  <h1>Σκαντζόχοιρος Αναζητά Τροφή</h1>
  <p>Βρες φαγητό πριν ξεμείνεις από πείνα!</p>
  <small>Χρησιμοποίησε το joystick για να κινηθείς · «Μύρισε» για να βρεις φαγητό</small>
  <button id="start-btn">Παίξε</button>
  <div id="load-msg">Φόρτωση σκαντζόχοιρου…</div>
</div>

<div id="end-overlay">
  <h2 id="end-title">Πολύ Πεινασμένος!</h2>
  <p id="end-sub">Ο σκαντζόχοιρός σου έμεινε χωρίς φαγητό…</p>
  <div id="end-score">Σκορ: <span id="final-score">0</span></div>
  <div id="end-best">Ρεκόρ: <span id="best-score">0</span></div>
  <button id="restart-btn">Παίξε Ξανά</button>
</div>

<script src="./assets/bundle.js"></script>
</body>
</html>
